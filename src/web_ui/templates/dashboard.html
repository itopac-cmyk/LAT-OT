<!DOCTYPE html>
<html>
<head>
    <title>LAT-OT Triage Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; }
        .triage-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 20px; padding: 20px; }
        .cve-header { color: #58a6ff; font-weight: bold; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px; }
        .asset-badge { background: #238636; color: white; margin-right: 5px; }
        .details-text { white-space: pre-wrap; font-size: 0.9em; background: #0d1117; padding: 15px; border-radius: 5px; border-left: 3px solid #ff7b72; }
        h1 { color: #f0f6fc; }
    </style>
</head>
<body class="container py-5">
    <header class="mb-5 d-flex justify-content-between align-items-center">
        <div>
            <h1>LAT-OT <span class="text-muted">|</span> <small style="font-size: 0.5em; color: #8b949e;">AI-POWERED OT TRIAGE</small></h1>
            <p class="text-muted">Multi-Agent Reasoning & VEX Compliance Dashboard</p>
        </div>
        <div class="text-end">
            <span class="badge bg-primary">MASTER THESIS EDITION 2026</span>
        </div>
    </header>

    <div id="results-container">
        <!-- Results will be loaded here via JS -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">Analyzing Multi-Agent Reports...</p>
        </div>
    </div>

    <script>
        function loadResults() {
            fetch('/api/results')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('results-container');
                    container.innerHTML = '';
                    if (data.length === 0) {
                        container.innerHTML = '<div class="alert alert-info">No VEX reports found. Run the Batch Processor first.</div>';
                        return;
                    }
                    data.reverse().forEach(res => {
                        const div = document.createElement('div');
                        div.className = 'triage-card';
                        div.innerHTML = `
                            <div class="cve-header">
                                ${res.cve} <span class="float-end text-muted" style="font-size: 0.7em;">${res.timestamp}</span>
                            </div>
                            <div class="mb-3">
                                <strong>Affected Assets:</strong> 
                                ${res.assets.map(a => `<span class="badge asset-badge">${a}</span>`).join('')}
                            </div>
                            <div class="details-text">${res.details}</div>
                        `;
                        container.appendChild(div);
                    });
                });
        }
        loadResults();
    </script>
</body>
</html>
